<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GridFlow - Controle ADM</title>
  <link rel="icon" type="image/png" href="/logo3.png">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f1f5f9; color: #1e293b; min-height: 100vh; }

    /* LOGIN */
    #tela-login {
      min-height: 100vh; display: flex; align-items: center;
      justify-content: center; padding: 24px;
    }
    .card-login {
      background: #fff; border-radius: 14px; padding: 40px 36px;
      box-shadow: 0 8px 32px rgba(0,0,0,.1); width: 100%; max-width: 380px;
    }
    .logo-row { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; }
    .logo-row img { width: 38px; height: 38px; border-radius: 8px; }
    .logo-nome { font-weight: 800; font-size: 1.1rem; color: #0f1c3a; }
    .logo-badge {
      font-size: 0.6rem; font-weight: 700; color: #dc2626;
      background: #fee2e2; border: 1px solid #fecaca;
      padding: 2px 7px; border-radius: 5px; text-transform: uppercase;
    }
    h2 { font-size: 1.15rem; font-weight: 700; margin-bottom: 5px; }
    .subtitulo { font-size: 0.82rem; color: #64748b; margin-bottom: 24px; }
    label { display: block; font-size: 0.78rem; font-weight: 600; color: #64748b; margin-bottom: 4px; }
    input[type=email], input[type=password] {
      width: 100%; padding: 10px 12px; border: 1.5px solid #e2e8f0;
      border-radius: 8px; font-size: 0.9rem; margin-bottom: 14px; outline: none;
      font-family: inherit;
    }
    input:focus { border-color: #2563eb; }
    #erro-msg { color: #dc2626; font-size: 0.8rem; margin-bottom: 12px; display: none; }
    .btn-entrar {
      width: 100%; padding: 11px; background: #0f1c3a; color: #fff;
      border: none; border-radius: 8px; font-size: 0.92rem; font-weight: 700;
      cursor: pointer; font-family: inherit;
    }
    .btn-entrar:hover { background: #1a3060; }
    .btn-entrar:disabled { opacity: .6; cursor: default; }

    /* DASHBOARD */
    #tela-dashboard { display: none; }
    .topbar {
      background: #0f1c3a; height: 54px; padding: 0 24px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .topbar-left { display: flex; align-items: center; gap: 10px; }
    .topbar-left img { width: 28px; height: 28px; border-radius: 6px; }
    .topbar-left span { font-weight: 700; color: #e2e8f0; font-size: 0.92rem; }
    .topbar-badge {
      font-size: 0.58rem; font-weight: 700; color: #fca5a5;
      background: rgba(239,68,68,.2); border: 1px solid rgba(239,68,68,.3);
      padding: 2px 7px; border-radius: 5px; text-transform: uppercase;
    }
    .topbar-right { display: flex; align-items: center; gap: 10px; }
    .topbar-user { font-size: 0.75rem; color: #94a3b8; }
    .btn-top {
      padding: 4px 13px; border-radius: 6px; font-size: 0.76rem;
      cursor: pointer; font-family: inherit; border: 1px solid rgba(255,255,255,.15);
      background: rgba(255,255,255,.08); color: #cbd5e1;
    }
    .btn-top:hover { background: rgba(255,255,255,.14); }

    .dash-body { padding: 24px; }

    .totais { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 12px; margin-bottom: 24px; }
    .total-card {
      background: #fff; border-radius: 11px; padding: 18px;
      border: 1.5px solid #e2e8f0;
    }
    .total-num { font-size: 2rem; font-weight: 800; color: #0f1c3a; }
    .total-lbl { font-size: 0.76rem; color: #64748b; margin-top: 3px; }

    .sec-titulo {
      font-size: 0.72rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .06em; color: #64748b; margin-bottom: 10px;
    }
    .tabela-wrap { background: #fff; border-radius: 11px; border: 1.5px solid #e2e8f0; overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    th {
      background: #f8fafc; padding: 10px 14px; text-align: left;
      font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .04em; color: #64748b; border-bottom: 1px solid #e2e8f0;
      white-space: nowrap;
    }
    td { padding: 11px 14px; font-size: 0.83rem; border-bottom: 1px solid #f8fafc; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafbfc; }
    .badge {
      display: inline-block; padding: 2px 8px; border-radius: 7px;
      font-size: 0.68rem; font-weight: 700;
    }
    .badge-corp { background: #eff6ff; color: #1d4ed8; }
    .badge-pes  { background: #fdf4ff; color: #7e22ce; }
    .badge-free { background: #f1f5f9; color: #64748b; }
    .badge-pago { background: #dcfce7; color: #166534; }
    .num-b { font-weight: 700; }
    .num-z { color: #cbd5e1; }
    .msg-vazio { text-align: center; padding: 40px; color: #94a3b8; font-size: 0.85rem; }
    .erro-msg { text-align: center; padding: 40px; color: #dc2626; font-size: 0.85rem; }
    .carregando { text-align: center; padding: 40px; color: #64748b; font-size: 0.85rem; }
  </style>
</head>
<body>

<div id="tela-login">
  <div class="card-login">
    <div class="logo-row">
      <img src="/logo3.png" alt="GridFlow">
      <span class="logo-nome">GridFlow</span>
      <span class="logo-badge">ADM</span>
    </div>
    <h2>Acesso restrito</h2>
    <p class="subtitulo">Area exclusiva do administrador do sistema.</p>
    <label>E-mail</label>
    <input id="inp-email" type="email" placeholder="seu@email.com" autocomplete="email">
    <label>Senha</label>
    <input id="inp-senha" type="password" placeholder="••••••••">
    <div id="erro-msg"></div>
    <button class="btn-entrar" id="btn-entrar">Entrar</button>
  </div>
</div>

<div id="tela-dashboard">
  <div class="topbar">
    <div class="topbar-left">
      <img src="/logo3.png" alt="">
      <span>GridFlow</span>
      <span class="topbar-badge">Controle ADM</span>
    </div>
    <div class="topbar-right">
      <span class="topbar-user" id="lbl-user"></span>
      <button class="btn-top" id="btn-refresh">Atualizar</button>
      <button class="btn-top" id="btn-sair">Sair</button>
    </div>
  </div>
  <div class="dash-body">
    <div id="dash-conteudo"><div class="carregando">Carregando...</div></div>
  </div>
</div>

<script>
let token = sessionStorage.getItem('adm_token') || '';

function cel(v) {
  return v > 0 ? `<span class="num-b">${v}</span>` : `<span class="num-z">0</span>`;
}

function mostrarDados(d) {
  const t = d.totais;
  const linhas = (d.contas || []).map(c => {
    const nome  = c.nome_empresa || c.email_dono || 'Conta #' + c.id;
    const ident = c.dominio || c.email_dono || '-';
    const tipo  = c.tipo === 'corporativo'
      ? '<span class="badge badge-corp">Corporativo</span>'
      : '<span class="badge badge-pes">Pessoal</span>';
    const plano = c.plano && c.plano !== 'gratuito'
      ? `<span class="badge badge-pago">${c.plano}</span>`
      : '<span class="badge badge-free">Gratuito</span>';
    const data = (c.criado_em || '').slice(0, 10) || '-';
    return `<tr>
      <td><strong>${nome}</strong><br><small style="color:#94a3b8">${ident}</small></td>
      <td>${tipo}</td><td>${plano}</td>
      <td>${cel(c.colaboradores)}</td>
      <td>${cel(c.empresas)}</td>
      <td>${cel(c.anotacoes)}</td>
      <td style="color:#94a3b8;font-size:.76rem">${data}</td>
    </tr>`;
  }).join('');

  document.getElementById('dash-conteudo').innerHTML = `
    <div class="totais">
      <div class="total-card"><div class="total-num">${t.contas}</div><div class="total-lbl">Contas ativas</div></div>
      <div class="total-card"><div class="total-num">${t.colaboradores}</div><div class="total-lbl">Colaboradores</div></div>
      <div class="total-card"><div class="total-num">${t.empresas}</div><div class="total-lbl">Empresas geridas</div></div>
      <div class="total-card"><div class="total-num">${t.anotacoes}</div><div class="total-lbl">Anotacoes criadas</div></div>
    </div>
    <div class="sec-titulo">Contas cadastradas</div>
    <div class="tabela-wrap">
      <table>
        <thead><tr>
          <th>Nome / Identificador</th><th>Tipo</th><th>Plano</th>
          <th>Colaboradores</th><th>Empresas</th><th>Anotacoes</th><th>Cadastro</th>
        </tr></thead>
        <tbody>${linhas || '<tr><td colspan="7" class="msg-vazio">Nenhuma conta encontrada</td></tr>'}</tbody>
      </table>
    </div>`;
}

async function carregarDados() {
  document.getElementById('dash-conteudo').innerHTML = '<div class="carregando">Carregando dados...</div>';
  try {
    const r = await fetch('/api/admin/dados', { headers: { 'x-admin-key': token } });
    if (r.status === 401) { sair(); return; }
    const d = await r.json();
    if (d.erro) { document.getElementById('dash-conteudo').innerHTML = '<div class="erro-msg">Erro: ' + d.erro + '</div>'; return; }
    mostrarDados(d);
  } catch (e) {
    document.getElementById('dash-conteudo').innerHTML = '<div class="erro-msg">Erro de conexao: ' + e.message + '</div>';
  }
}

function abrirDashboard(email) {
  document.getElementById('tela-login').style.display = 'none';
  document.getElementById('tela-dashboard').style.display = 'block';
  document.getElementById('lbl-user').textContent = email;
  carregarDados();
}

function sair() {
  sessionStorage.removeItem('adm_token');
  sessionStorage.removeItem('adm_email');
  token = '';
  document.getElementById('tela-dashboard').style.display = 'none';
  document.getElementById('tela-login').style.display = 'flex';
}

// Auto-login se token salvo
if (token) {
  abrirDashboard(sessionStorage.getItem('adm_email') || '');
}

document.getElementById('btn-entrar').addEventListener('click', async () => {
  const email = document.getElementById('inp-email').value.trim();
  const senha = document.getElementById('inp-senha').value;
  const erroEl = document.getElementById('erro-msg');
  const btn = document.getElementById('btn-entrar');
  erroEl.style.display = 'none';
  if (!email || !senha) { erroEl.textContent = 'Preencha e-mail e senha.'; erroEl.style.display = 'block'; return; }
  btn.disabled = true; btn.textContent = 'Entrando...';
  try {
    const r = await fetch('/api/admin/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, senha })
    });
    const d = await r.json();
    if (!r.ok) { erroEl.textContent = d.erro || 'Credenciais invalidas.'; erroEl.style.display = 'block'; return; }
    token = d.token;
    sessionStorage.setItem('adm_token', token);
    sessionStorage.setItem('adm_email', email);
    abrirDashboard(email);
  } catch (e) {
    erroEl.textContent = 'Erro de conexao.'; erroEl.style.display = 'block';
  } finally {
    btn.disabled = false; btn.textContent = 'Entrar';
  }
});

document.getElementById('inp-senha').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('btn-entrar').click();
});
document.getElementById('btn-sair').addEventListener('click', sair);
document.getElementById('btn-refresh').addEventListener('click', carregarDados);
</script>
</body>
</html>
