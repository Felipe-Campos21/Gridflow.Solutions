<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GridFlow - Gestão de Atividades Contábeis</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div id="app">
  <!-- Sidebar -->
  <aside class="app-sidebar" id="app-sidebar">
    <div class="sidebar-logo">
      <div class="logo-cube">GF</div>
      <div class="logo-text">Grid<strong>Flow</strong></div>
    </div>

    <nav class="sidebar-nav">
      <button class="nav-item active" data-tab="dashboard">
        <span class="nav-icon">✅</span>
        <span class="nav-label">Checklist</span>
      </button>
      <button class="nav-item" data-tab="atividades">
        <span class="nav-icon">📋</span>
        <span class="nav-label">Atividades</span>
      </button>
      <div class="nav-divider"></div>
      <button class="nav-item" data-tab="configurar">
        <span class="nav-icon">⚙️</span>
        <span class="nav-label">Configurar</span>
      </button>
      <button class="nav-item" data-tab="empresas">
        <span class="nav-icon">🏢</span>
        <span class="nav-label">Empresas</span>
      </button>
      <button class="nav-item" data-tab="colaboradores">
        <span class="nav-icon">👥</span>
        <span class="nav-label">Colaboradores</span>
      </button>
      <div class="nav-divider"></div>
      <button class="nav-item" data-tab="status">
        <span class="nav-icon">📊</span>
        <span class="nav-label">Status</span>
      </button>
    </nav>

    <div class="sidebar-bottom">
      <div class="sidebar-user" id="user-switch">
        <div class="user-avatar" id="user-avatar">?</div>
        <span class="user-name" id="current-user">Selecionar...</span>
      </div>
      <button class="sidebar-toggle" id="sidebar-toggle" title="Recolher menu">‹‹</button>
    </div>
  </aside>

  <!-- Main -->
  <div class="app-main">
    <header class="app-topbar">
      <div class="topbar-title" id="topbar-title">Checklist</div>
      <div class="topbar-right">
        <span class="status-dot" id="status-dot"></span>
        <div style="position:relative">
          <button id="btn-periodo" title="Período ativo">
            📅 <span id="periodo-display">--/----</span> ▾
          </button>
          <div id="periodo-dropdown" class="dropdown-menu"></div>
        </div>
        <button class="btn-icon" id="btn-settings" title="Configurações">⚙️</button>
      </div>
    </header>

    <main class="app-content" id="app-content">
      <!-- Conteúdo carregado dinamicamente -->
    </main>
  </div>
</div>

<!-- Modal de Seleção de Usuário -->
<div id="user-modal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2>👤 Selecionar Usuário</h2>
      <button class="modal-close" onclick="App.closeUserModal()">×</button>
    </div>
    <div class="modal-body">
      <div id="user-list"></div>
    </div>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/app.js"></script>
</body>
</html>
