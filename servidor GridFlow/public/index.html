<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GridFlow - Gestão de Atividades Contábeis</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div id="app">
  <!-- Sidebar -->
  <aside class="app-sidebar" id="app-sidebar">
    <div class="sidebar-logo">
      <div style="display:flex;align-items:center;gap:10px">
        <div style="background:#fff;border-radius:10px;padding:4px;display:flex;align-items:center;justify-content:center;width:42px;height:42px;flex-shrink:0">
          <img src="logo.png" alt="GridFlow" style="width:36px;height:36px;object-fit:contain">
        </div>
        <div class="logo-text">Grid<strong>Flow</strong></div>
      </div>
    </div>

    <nav class="sidebar-nav">
      <button class="nav-item active" data-tab="dashboard">
        <span class="nav-icon">✅</span>
        <span class="nav-label">Checklist</span>
      </button>
      <button class="nav-item" data-tab="atividades">
        <span class="nav-icon">📋</span>
        <span class="nav-label">Atividades</span>
      </button>
      <div class="nav-divider"></div>
      <button class="nav-item" data-tab="configurar">
        <span class="nav-icon">⚙️</span>
        <span class="nav-label">Configurar</span>
      </button>
      <button class="nav-item" data-tab="empresas">
        <span class="nav-icon">🏢</span>
        <span class="nav-label">Empresas</span>
      </button>
      <button class="nav-item" data-tab="colaboradores">
        <span class="nav-icon">👥</span>
        <span class="nav-label">Colaboradores</span>
      </button>
      <button class="nav-item" data-tab="relatorio">
        <span class="nav-icon">📝</span>
        <span class="nav-label">Relatório</span>
      </button>
      <div class="nav-divider"></div>
      <button class="nav-item" data-tab="status">
        <span class="nav-icon">📊</span>
        <span class="nav-label">Status</span>
      </button>
    </nav>

    <div class="sidebar-bottom">
      <div class="sidebar-user" id="user-switch">
        <div class="user-avatar" id="user-avatar">?</div>
        <span class="user-name" id="current-user">Selecionar...</span>
      </div>
      <button class="sidebar-toggle" id="sidebar-toggle" title="Recolher menu">‹‹</button>
    </div>
  </aside>

  <!-- Main -->
  <div class="app-main">
    <header class="app-topbar">
      <div class="topbar-title" id="topbar-title">Checklist</div>
      <div class="topbar-right">
        <span class="status-dot" id="status-dot"></span>
        <div style="position:relative">
          <button id="btn-periodo" title="Período ativo">
            📅 <span id="periodo-display">--/----</span> ▾
          </button>
          <div id="periodo-dropdown" class="dropdown-menu"></div>
        </div>
        <button class="btn-icon" id="btn-settings" title="Configurações">⚙️</button>
      </div>
    </header>

    <main class="app-content" id="app-content">
      <!-- Conteúdo carregado dinamicamente -->
    </main>
  </div>
</div>

<!-- Modal de Seleção de Usuário -->
<div id="user-modal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2>👤 Selecionar Usuário</h2>
      <button class="modal-close" onclick="App.closeUserModal()">×</button>
    </div>
    <div class="modal-body">
      <div id="user-list"></div>
      <div style="border-top:1px solid #f0f0f0;margin-top:12px;padding-top:12px">
        <button onclick="App.logout()" style="width:100%;padding:10px;background:#fff5f5;border:1px solid #feb2b2;border-radius:8px;color:#c53030;font-weight:600;cursor:pointer;font-size:0.85rem">🚪 Sair da conta</button>
      </div>
    </div>
  </div>
</div>

<!-- Modal de Atividade -->
<div id="modal-atividade" class="modal">
  <div class="modal-content" style="max-width:500px">
    <div class="modal-header">
      <div>
        <h2 id="modal-atv-nome" style="font-size:1.05rem;font-weight:700;color:#2d3748;margin:0"></h2>
        <div style="font-size:0.78rem;color:#718096;margin-top:4px">
          <span id="modal-atv-empresa"></span> · 📅 <span id="modal-atv-periodo" style="color:#3498db;font-weight:600"></span>
        </div>
      </div>
      <button class="modal-close" id="btn-modal-atv-close">×</button>
    </div>
    <div class="modal-body">
      <div style="margin-bottom:16px">
        <label style="font-size:0.8rem;font-weight:600;color:#4a5568;display:block;margin-bottom:6px">
          Observação <span style="color:#a0aec0;font-weight:400">(opcional)</span>
        </label>
        <textarea id="modal-atv-obs" rows="3" placeholder="Adicione uma nota ou deixe em branco..."
          style="width:100%;padding:10px 12px;border:1px solid #e2e8f0;border-radius:8px;font-size:0.88rem;resize:vertical;font-family:inherit;box-sizing:border-box"></textarea>
      </div>
      <div id="modal-atv-btns" style="display:flex;gap:8px;flex-wrap:wrap;align-items:center"></div>
    </div>
  </div>
</div>

<!-- Modal Configurar Grupos Integrados -->
<div id="modal-grupos" class="modal">
  <div class="modal-content" style="max-width:440px">
    <div class="modal-header">
      <h2>⚙️ Grupos Integrados</h2>
      <button class="modal-close" id="btn-modal-grupos-close">×</button>
    </div>
    <div class="modal-body">
      <p style="font-size:0.82rem;color:#718096;margin-bottom:16px">
        Grupos marcados: ao registrar na <strong>matriz</strong>, são registrados automaticamente em todas as <strong>filiais</strong>.
      </p>
      <div id="modal-grupos-lista"></div>
      <div style="margin-top:20px;display:flex;justify-content:flex-end">
        <button class="btn btn-primary" id="btn-salvar-grupos" style="padding:10px 24px">💾 Salvar</button>
      </div>
    </div>
  </div>
</div>

<!-- Modal Reset Checklist -->
<div id="modal-reset" class="modal">
  <div class="modal-content" style="max-width:420px">
    <div class="modal-header">
      <h2>🔄 Resetar Checklist</h2>
      <button class="modal-close" id="btn-modal-reset-close">×</button>
    </div>
    <div class="modal-body">
      <p style="font-size:0.84rem;color:#718096;margin-bottom:16px">
        Escolha o que deseja resetar para <strong id="reset-empresa-nome"></strong> no período <strong id="reset-periodo-nome" style="color:#3498db"></strong>.
      </p>
      <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:20px">
        <button class="btn btn-danger" id="btn-reset-tudo" style="padding:12px;font-size:0.9rem">
          🔄 Resetar Checklist Completo
        </button>
        <button class="btn btn-secondary" id="btn-reset-grupo-toggle" style="padding:12px;font-size:0.9rem">
          📋 Resetar por Grupo
        </button>
      </div>
      <div id="reset-grupos-area" style="display:none">
        <div style="font-size:0.8rem;font-weight:600;color:#4a5568;margin-bottom:8px">Selecione os grupos:</div>
        <div id="reset-grupos-lista" style="display:flex;flex-direction:column;gap:6px;margin-bottom:14px"></div>
        <button class="btn btn-primary" id="btn-reset-grupos-confirmar" style="width:100%;padding:10px">
          Resetar Grupos Selecionados
        </button>
      </div>
    </div>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/app.js"></script>
</body>
</html>
